{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Cayman Golf Brixham</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; margin: 0; background: #f0fdf4; }
        .wrap { max-width: 500px; margin: 80px auto; background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        h1 { font-family: 'Oswald', sans-serif; color: #14532d; font-size: 1.8rem; margin-bottom: 8px; }
        p { color: #555; font-size: 0.95rem; }
        .btn { display: inline-block; padding: 14px 32px; background: #16a34a; color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 1rem; margin-top: 20px; transition: background 0.2s; }
        .btn:hover { background: #15803d; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Payment</h1>
    {% if invoice %}
    <p>Booking: {{ invoice.description }}</p>
    <p style="font-size: 2rem; font-weight: 700; color: #16a34a; margin: 16px 0;">£{{ invoice.amount }}</p>
    </p>
    <p><a href="{% url 'billing:checkout' %}?invoice={{ invoice.id }}" class="btn">Pay with Stripe</a></p>
    {% else %}
    <p>No invoice found.</p>
    {% endif %}
    <p style="margin-top: 24px;"><a href="/bookings/my-bookings/" style="color: #16a34a; text-decoration: none;">Back to my bookings</a></p>
</div>
</body>
</html>
