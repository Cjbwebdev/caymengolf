{% extends "base.html" %}
{% block title %}Confirm Lesson Booking — Cayman Golf{% endblock %}
{% block content %}
<section class="py-16">
    <div class="max-w-xl mx-auto px-4">
        <div class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm">
            <h1 class="font-display text-3xl font-bold mb-2">Confirm Lesson Booking</h1>
            <div class="bg-golf-50 rounded-lg p-4 mb-6">
                <p class="text-golf-800 font-bold">{{ slot.date|date:"l, j F Y" }}</p>
                <p class="text-golf-600 text-2xl font-display font-bold">{{ slot.time|time:"H:i" }}</p>
                <p class="text-gray-500 text-sm">45 min lesson with Dan • £45</p>
            </div>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Player Name</label>
                    <input type="text" name="player_name" value="{{ user.username }}" required class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-golf-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Level / Notes (optional)</label>
                    <textarea name="notes" rows="2" placeholder="e.g. Beginner, working on putting" class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-golf-500"></textarea>
                </div>
                <div class="flex gap-3">
                    <a href="/lessons/" class="flex-1 text-center border border-gray-200 px-4 py-3 rounded-lg hover:bg-gray-50 transition font-bold">Cancel</a>
                    <button type="submit" class="flex-1 bg-golf-600 text-white px-4 py-3 rounded-lg hover:bg-golf-700 transition font-bold">Confirm Lesson</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
