{% extends "base.html" %}
{% block title %}Sign In — Cayman Golf{% endblock %}
{% block content %}
<section class="py-20">
    <div class="max-w-md mx-auto px-4">
        <div class="text-center mb-8">
            <h1 class="font-display text-4xl font-bold text-golf-900 mb-2">Welcome Back</h1>
        </div>
        <div class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {% for field in form %}
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <button type="submit" class="w-full bg-golf-600 text-white font-bold py-3 rounded-lg hover:bg-golf-700 transition text-lg">Sign In</button>
            </form>
            <p class="text-gray-500 text-sm text-center mt-4">Don't have an account? <a href="/golfers/signup/" class="text-golf-600 font-bold hover:underline">Sign up</a></p>
        </div>
    </div>
</section>
{% endblock %}
